<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name='description' content='原站-AES 离线加密工具'>
    <title>AES 离线加密工具</title>
    <script src="./crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <style>
        /* 保持你原有的 CSS 风格，仅做必要间距微调 */
        label { font-weight: bold; display: block; margin: 15px 0 8px 0; color: #666; }
        textarea { width: 100%; max-width: 600px; height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; resize: vertical; font-family: monospace; }
        input[type="password"] { width: 100%; max-width: 600px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-group { margin: 15px 0; display: flex; }
        /* Chrome 46 对 gap 支持不好，改用 margin */
        .btn-group button { margin-right: 10px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; }
        .btn-encode { background-color: #007bff; color: white; }
        .btn-decode { background-color: #6c757d; color: white; }
        .btn-copy { background-color: #28a745; color: white; }
        .tips { font-size: 12px; color: #999; margin-top: 5px; min-height: 1.5em; }
        .algo-tag { font-size: 12px; color: #888; margin: 10px 0; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <ul class="ys-head">
            <li><a href="index.html">首页</a></li>
            <li><a href="bayinhe.html">八音盒</a></li>
            <li><a href="shop.html">商城</a></li>
            <li><a href="https://ys.mihoyo.com/cloud/#/">云原神</a></li>
            <li><a href="tools.html">工具合集</a></li>
        </ul>
    </header>
    <nav class="banner">
        <img src="images/bann.png" alt="banner">
    </nav>

    <div class="shengyiwu-list">
        <h1>AES 离线加密工具</h1>
        
        <p class="algo-tag">
            🔒 安全协议：采用 <strong>AES-256-CBC</strong> 算法，完全离线运行。
        </p>
        
        <label for="input">输入原文或密文：</label>
        <textarea id="input" placeholder="请输入内容..."></textarea>

        <label for="pwd">解密钥匙 (Password)：</label>
        <input type="password" id="pwd" placeholder="输入钥匙...">

        <div class="btn-group">
            <button class="btn-encode" onclick="handleEncrypt()">🔒 加密</button>
            <button class="btn-decode" onclick="handleDecrypt()">🔓 解密</button>
            <button class="btn-copy" onclick="handleCopy()">复制结果</button>
        </div>

        <label for="output">结果显示区：</label>
        <textarea id="output" readonly placeholder="等待处理..."></textarea>
        
        <p id="msg" class="tips"></p>
    </div>

    <script>
        "use strict";

        // 提示信息处理 (兼容老版本浏览器)
        function showMsg(text, color) {
            var msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.color = color || "#666";
            setTimeout(function() {
                if (msg.innerText === text) {
                    msg.innerText = "";
                }
            }, 3000);
        }

        // 加密逻辑
        function handleEncrypt() {
            var content = document.getElementById('input').value;
            var password = document.getElementById('pwd').value;
            
            if (!content || !password) {
                showMsg("内容和钥匙都不能少哦！", "#dc3545");
                return;
            }

            try {
                // CryptoJS 内部会自动处理兼容性
                var encrypted = CryptoJS.AES.encrypt(content, password).toString();
                document.getElementById('output').value = encrypted;
                showMsg("加密成功！", "#28a745");
            } catch (e) {
                showMsg("加密出错了。", "#dc3545");
            }
        }

        // 解密逻辑
        function handleDecrypt() {
            var cipherText = document.getElementById('input').value;
            var password = document.getElementById('pwd').value;
            
            if (!cipherText || !password) {
                showMsg("请输入密文和钥匙！", "#dc3545");
                return;
            }

            try {
                var bytes = CryptoJS.AES.decrypt(cipherText, password);
                var originalText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!originalText) {
                    throw new Error("Wrong Password");
                }
                
                document.getElementById('output').value = originalText;
                showMsg("解密成功！", "#28a745");
            } catch (e) {
                showMsg("解密失败！钥匙错误或密文不完整。", "#dc3545");
                document.getElementById('output').value = "";
            }
        }

        // 复制逻辑
        function handleCopy() {
            var outputText = document.getElementById('output');
            if (!outputText.value) {
                showMsg("没有内容可复制", "#dc3545");
                return;
            }
            
            outputText.select();
            try {
                document.execCommand('copy');
                showMsg("已成功复制！", "#28a745");
            } catch (err) {
                showMsg("复制失败，请手动操作。", "#dc3545");
            }
        }
    </script>
</body>
</html>
