<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name='description' content='跨性别背景头像合成器'>
    <title>头像背景合成器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" >
    
    <style>
        .avatar-tool { background: white; padding: 2rem; border-radius: 16px; text-align: center; margin: 20px auto; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .avatar-tool canvas { max-width: 100%; height: auto; margin-top: 20px; border: 2px solid #eee; border-radius: 12px; display: none; }
        .upload-area { display: block; margin: 25px 0; border: 2px dashed #55CDFC; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background-color: #faffff; border-color: #F7A8B8; }
        #upload { display: none; }
        .btn-save { background-color: #55CDFC; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; text-decoration: none; display: none; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-save:hover { background-color: #F7A8B8; box-shadow: 0 4px 10px rgba(247, 168, 184, 0.4); }
        .tool-desc { color: #888; font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <header>
        <ul class="ys-head">
            <li><a href="index.html">首页</a></li>
            <li><a href="bayinhe.html">八音盒</a></li>
            <li><a href="shop.html">商城</a></li>
            <li><a href="https://ys.mihoyo.com/cloud/#/">云原神</a></li>
            <li><a href="tools.html">工具合集</a></li>
        </ul>
    </header>
    
    <nav class="banner">
        <img src="images/bann.png" alt="">
    </nav>
    
    <div>
        <h1 style="text-align: center; margin-top: 20px;">头像背景合成器</h1>
        
        <div class="avatar-tool">
            <p class="tool-desc">上传一张透明 PNG 图片，可自动且脱机地合成跨性别骄傲旗为底的背景。<br>下载时将以时间戳命名</p>
            
            <label for="upload" class="upload-area">
                <span id="upload-text">点击或拖拽上传透明 PNG</span>
                <input type="file" id="upload" >
            </label>
            
            <canvas id="canvas"></canvas>
            <br>
            <a id="download" class="btn-save">保存我的新头像</a>
        </div>

        <script>
            // 使用 var 以确保在旧版浏览器中的兼容性
            var upload = document.getElementById('upload');
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var downloadBtn = document.getElementById('download');
            var uploadText = document.getElementById('upload-text');

            // 自定义补零函数，替代 ES6 的 padStart
            function padLeft(num) {
                return num < 10 ? '0' + num : '' + num;
            }

            // 时间戳+随机数命名函数 (兼容版)
            function generateFileName() {
                var now = new Date();
                var y = now.getFullYear();
                var m = padLeft(now.getMonth() + 1);
                var d = padLeft(now.getDate());
                var h = padLeft(now.getHours());
                var min = padLeft(now.getMinutes());
                var s = padLeft(now.getSeconds());
                
                // 生成6位随机数
                var randomNum = Math.floor(Math.random() * 900000 + 100000);
                
                // 使用 + 号拼接字符串，替代反引号
                return "transgender_icon_" + y + m + d + h + min + s + randomNum + ".png";
            }

            upload.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;

                uploadText.innerText = "已选择: " + file.name;

                var reader = new FileReader();
                reader.onload = function(event) {
                    var img = new Image();
                    img.onload = function() {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        canvas.style.display = 'block';

                        var colors = ['#55CDFC', '#F7A8B8', '#FFFFFF', '#F7A8B8', '#55CDFC'];
                        var stripeHeight = canvas.height / 5;
                        
                        for (var i = 0; i < colors.length; i++) {
                            ctx.fillStyle = colors[i];
                            ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight + 1);
                        }

                        ctx.drawImage(img, 0, 0);

                        downloadBtn.style.display = 'inline-block';
                        downloadBtn.onclick = function() {
                            var dataUrl = canvas.toDataURL("image/png");
                            downloadBtn.href = dataUrl;
                            downloadBtn.download = generateFileName();
                        };
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        </script>
    </div>
</body>
</html>
